name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PowerInvoke.slnx

      - name: Build
        run: dotnet build PowerInvoke.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PowerInvoke.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/PowerInvoke/PowerInvoke.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/packages/*
