name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish. Leave blank to use the project version.
        required: false
        type: string

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PowerInvoke.slnx

      - name: Build
        run: dotnet build PowerInvoke.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PowerInvoke.slnx --configuration Release --no-build

      - name: Pack
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            dotnet pack src/PowerInvoke/PowerInvoke.csproj --configuration Release --no-build --output artifacts/packages
          }
          else {
            dotnet pack src/PowerInvoke/PowerInvoke.csproj --configuration Release --no-build --output artifacts/packages -p:Version=$version
          }

      - name: Publish to NuGet
        shell: pwsh
        run: |
          $packages = Get-ChildItem "artifacts/packages/*.nupkg" -File |
            Where-Object { $_.Name -notlike "*.symbols.nupkg" }

          if ($packages.Count -eq 0) {
            throw "No NuGet packages were found in artifacts/packages."
          }

          foreach ($package in $packages) {
            dotnet nuget push $package.FullName --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
